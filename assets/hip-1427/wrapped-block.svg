<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="920" viewBox="0 0 1060 920">
<rect width="1060" height="920" fill="#ffffff"/>
<text x="530" y="34" text-anchor="middle" dominant-baseline="central" font-size="24" font-family="sans-serif" font-weight="bold" fill="#1a5276">Wrapped Block Structure</text>
<text x="530" y="58" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" font-style="italic" fill="#566573">Each historical record file block is converted into one block stream Block</text>

<!-- Outer block box -->
<rect x="30" y="74" width="1000" height="810" rx="10" fill="#f8f9fa" stroke="#1a5276" stroke-width="2.5"/>
<text x="530" y="100" text-anchor="middle" dominant-baseline="central" font-size="18" font-family="sans-serif" font-weight="bold" fill="#1a5276">Block  (block_number = N)</text>

<!-- ── BlockHeader ─────────────────────────────────────────── -->
<rect x="50" y="116" width="960" height="150" rx="7" fill="#d6eaf8" stroke="#1a5276" stroke-width="1.8"/>
<rect x="60" y="124" width="300" height="26" rx="4" fill="#1a5276"/>
<text x="70" y="137" text-anchor="start" dominant-baseline="central" font-size="14" font-family="sans-serif" font-weight="bold" fill="#ffffff">BlockHeader</text>

<text x="70" y="166" text-anchor="start" dominant-baseline="central" font-size="10" font-family="monospace" fill="#1a5276">block_number:</text>
<text x="300" y="166" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">N — monotonically increasing block number</text>

<text x="70" y="192" text-anchor="start" dominant-baseline="central" font-size="10" font-family="monospace" fill="#1a5276">first_transaction_consensus_time:</text>
<text x="300" y="192" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">Consensus timestamp of the first transaction</text>

<text x="70" y="218" text-anchor="start" dominant-baseline="central" font-size="10" font-family="monospace" fill="#1a5276">hapi_proto_version:</text>
<text x="300" y="218" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">HAPI protocol version active at this block</text>

<text x="70" y="244" text-anchor="start" dominant-baseline="central" font-size="10" font-family="monospace" fill="#1a5276">software_version:</text>
<text x="300" y="244" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">Consensus node software version at this block</text>

<!-- ── StateChanges (OPTIONAL) ────────────────────────────── -->
<rect x="50" y="275" width="960" height="100" rx="7" fill="#eaecee" stroke="#566573" stroke-width="1.8"/>
<rect x="60" y="283" width="300" height="26" rx="4" fill="#566573"/>
<text x="70" y="296" text-anchor="start" dominant-baseline="central" font-size="14" font-family="sans-serif" font-weight="bold" fill="#ffffff">StateChanges</text>
<rect x="375" y="286" width="76" height="18" rx="9" fill="#999999"/>
<text x="413" y="295" text-anchor="middle" dominant-baseline="central" font-size="10" font-family="sans-serif" font-weight="bold" fill="#ffffff">OPTIONAL</text>

<text x="70" y="325" text-anchor="start" dominant-baseline="central" font-size="10" font-family="monospace" fill="#566573">state_changes:</text>
<text x="300" y="325" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">State mutation records not captured in the record file</text>

<text x="70" y="351" text-anchor="start" dominant-baseline="central" font-size="10" font-family="monospace" fill="#566573">consensus_timestamp:</text>
<text x="300" y="351" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">Timestamp of the state changes in this block</text>

<!-- ── RecordStreamFile ───────────────────────────────────── -->
<rect x="50" y="385" width="960" height="175" rx="7" fill="#eaecee" stroke="#566573" stroke-width="1.8"/>
<rect x="60" y="393" width="300" height="26" rx="4" fill="#444444"/>
<text x="70" y="406" text-anchor="start" dominant-baseline="central" font-size="14" font-family="sans-serif" font-weight="bold" fill="#ffffff">RecordStreamFile</text>

<text x="70" y="435" text-anchor="start" dominant-baseline="central" font-size="10" font-family="monospace" fill="#444444">record_stream_contents:</text>
<text x="300" y="435" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">Raw bytes of the original record file (v2 / v5 / v6) — preserved exactly</text>

<text x="70" y="461" text-anchor="start" dominant-baseline="central" font-size="10" font-family="monospace" fill="#444444">sidecar_files:</text>
<text x="300" y="461" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">Sidecar protobuf data (contract byte-code, state changes, etc.)</text>

<text x="70" y="487" text-anchor="start" dominant-baseline="central" font-size="10" font-family="monospace" fill="#444444">signature_files:</text>
<text x="300" y="487" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">RSA signatures produced by each consensus node for this record file</text>

<rect x="60" y="503" width="940" height="24" rx="3" fill="#ffffff" stroke="#566573" stroke-width="1" opacity="0.8"/>
<text x="530" y="515" text-anchor="middle" dominant-baseline="central" font-size="11" font-family="sans-serif" font-style="italic" fill="#566573">No bytes added or removed — the original record file is embedded verbatim.</text>

<!-- ── BlockFooter ────────────────────────────────────────── -->
<rect x="50" y="570" width="960" height="138" rx="7" fill="#fad7a0" stroke="#d35400" stroke-width="1.8"/>
<rect x="60" y="578" width="300" height="26" rx="4" fill="#d35400"/>
<text x="70" y="591" text-anchor="start" dominant-baseline="central" font-size="14" font-family="sans-serif" font-weight="bold" fill="#ffffff">BlockFooter</text>

<text x="70" y="618" text-anchor="start" dominant-baseline="central" font-size="10" font-family="monospace" fill="#d35400">previous_block_root_hash:</text>
<text x="300" y="618" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">SHA-384(block N−1)  [48 bytes]  — chains blocks together</text>

<text x="70" y="644" text-anchor="start" dominant-baseline="central" font-size="10" font-family="monospace" fill="#d35400">root_hash_of_all_block_hashes_tree:</text>
<text x="300" y="644" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">Streaming Merkle root of all block hashes 0…N−1  [48 bytes]</text>

<text x="70" y="670" text-anchor="start" dominant-baseline="central" font-size="10" font-family="monospace" fill="#d35400">start_of_block_state_root_hash:</text>
<text x="300" y="670" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">State root at block start  [48 bytes; 0x00…00 for historical blocks]</text>

<!-- ── BlockProof ──────────────────────────────────────────── -->
<rect x="50" y="718" width="960" height="148" rx="7" fill="#a9dfbf" stroke="#1e8449" stroke-width="1.8"/>
<rect x="60" y="726" width="300" height="26" rx="4" fill="#1e8449"/>
<text x="70" y="739" text-anchor="start" dominant-baseline="central" font-size="14" font-family="sans-serif" font-weight="bold" fill="#ffffff">BlockProof  (SignedRecordFileProof)</text>

<text x="70" y="766" text-anchor="start" dominant-baseline="central" font-size="10" font-family="monospace" fill="#1e8449">version:</text>
<text x="300" y="766" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">Record stream hashing algorithm version  (2, 5, or 6)</text>

<text x="70" y="792" text-anchor="start" dominant-baseline="central" font-size="10" font-family="monospace" fill="#1e8449">record_file_signatures:</text>
<text x="300" y="792" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">List of { node_id, rsa_signature_bytes } for each signing node</text>

<text x="70" y="818" text-anchor="start" dominant-baseline="central" font-size="10" font-family="monospace" fill="#1e8449">threshold:</text>
<text x="300" y="818" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">At least &#x230A;node_count / 3&#x230B; + 1 verified RSA signatures SHALL be present</text>

<!-- Footer note -->
<text x="530" y="896" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="sans-serif" font-style="italic" fill="#566573">Items appear in this exact order in every wrapped historical block (StateChanges is optional).</text>
</svg>
