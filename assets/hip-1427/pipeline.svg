<text x="100" y="282" text-anchor="start" dominant-baseline="central" font-size="13" font-family="sans-serif" font-weight="bold" fill="#566573">Download Record Files</text>
<text x="100" y="302" text-anchor="start" dominant-baseline="central" font-size="13" font-family="sans-serif" font-weight="bold" fill="#566573">from GCP</text>
<rect x="370" y="260" width="300" height="140" rx="6" fill="#eaecee" stroke="#566573" stroke-width="1"/>
<text x="382" y="322" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">GCP hedera-mainnet-streams</text>
<text x="382" y="344" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" fill="#1c2833">bucket  (≈ 30 TB)</text>
<rect x="700" y="260" width="300" height="140" rx="6" fill="#eaecee" stroke="#566573" stroke-width="1"/>
<text x="712" y="278" text-anchor="start" dominant-baseline="central" font-size="11" font-family="monospace" fill="#1c2833">$ rclone lsjson … → files.json</text>
<text x="712" y="298" text-anchor="start" dominant-baseline="central" font-size="11" font-family="monospace" fill="#1c2833">$ days split-files-listing</text>
<text x="712" y="316" text-anchor="start" dominant-baseline="central" font-size="11" font-family="monospace" fill="#1c2833">  → listingsByDay/</text>
<text x="712" y="336" text-anchor="start" dominant-baseline="central" font-size="11" font-family="monospace" fill="#1c2833">$ days download-days-v3</text>
<text x="712" y="356" text-anchor="start" dominant-baseline="central" font-size="11" font-family="monospace" fill="#1c2833">  → compressedDays/</text>
<rect x="1030" y="260" width="250" height="140" rx="6" fill="#eaecee" stroke="#566573" stroke-width="1"/>
<text x="1040" y="300" text-anchor="start" dominant-baseline="central" font-size="11" font-family="sans-serif" font-weight="bold" fill="#566573">✓ compressedDays/</text>
<text x="1040" y="320" text-anchor="start" dominant-baseline="central" font-size="11" font-family="sans-serif" font-weight="bold" fill="#566573">  YYYY-MM-DD.tar.zstd</text>
<text x="1040" y="340" text-anchor="start" dominant-baseline="central" font-size="11" font-family="sans-serif" fill="#566573">  (≈ 1 GB / day)</text>

<line x1="650" y1="402" x2="650" y2="409" stroke="#1a5276" stroke-width="2.5" marker-end="url(#arr)"/>

