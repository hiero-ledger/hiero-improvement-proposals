<text x="712" y="450" text-anchor="start" dominant-baseline="central" font-size="11" font-family="monospace" fill="#1c2833">  → recompute running hashes</text>
<text x="712" y="470" text-anchor="start" dominant-baseline="central" font-size="11" font-family="monospace" fill="#1c2833">  + addressBookHistory.json</text>
