<text x="358" y="360" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" font-weight="bold" font-style="normal" fill="#ffffff">3</text>
<text x="390" y="354" text-anchor="start" dominant-baseline="central" font-size="13" font-family="sans-serif" font-weight="bold" font-style="normal" fill="#b7950b">Validate Day Archives</text>
<text x="390" y="378" text-anchor="start" dominant-baseline="central" font-size="11" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">days validate  →  hash-chain check  +  addressBookHistory.json</text>
<rect x="330" y="428" width="500" height="82" rx="6" fill="#d6eaf8" stroke="#1a5276" stroke-width="1.4"/>
