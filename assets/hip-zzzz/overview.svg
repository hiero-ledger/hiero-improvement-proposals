<text x="140" y="340" text-anchor="middle" dominant-baseline="central" font-size="11" font-family="sans-serif" font-weight="normal" font-style="italic" fill="#566573">Record file metadata</text>
<text x="50" y="364" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">• block_times.bin</text>
<text x="50" y="386" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">• day_blocks.json</text>
<text x="50" y="408" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">• Record file CSV dump</text>
