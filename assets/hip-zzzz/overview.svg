<text x="358" y="264" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" font-weight="bold" font-style="normal" fill="#ffffff">2</text>
<text x="390" y="258" text-anchor="start" dominant-baseline="central" font-size="13" font-family="sans-serif" font-weight="bold" font-style="normal" fill="#566573">Download Record Files from GCP</text>
<text x="390" y="282" text-anchor="start" dominant-baseline="central" font-size="11" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">rclone lsjson  ·  days split-files-listing  ·  days download-days-v2</text>
