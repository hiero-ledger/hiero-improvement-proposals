<text x="390" y="474" text-anchor="start" dominant-baseline="central" font-size="11" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">4-stage concurrent pipeline: parse → convert → serialize → zip-write</text>
<rect x="330" y="524" width="500" height="82" rx="6" fill="#a9dfbf" stroke="#1e8449" stroke-width="1.4"/>
<circle cx="358" cy="552" r="16" fill="#1e8449"/>
<text x="358" y="552" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" font-weight="bold" font-style="normal" fill="#ffffff">5</text>
<text x="390" y="546" text-anchor="start" dominant-baseline="central" font-size="13" font-family="sans-serif" font-weight="bold" font-style="normal" fill="#1e8449">Verify Wrapped Blocks  (blocks validate-wrapped)</text>
<text x="390" y="570" text-anchor="start" dominant-baseline="central" font-size="11" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">hash chain  ·  Merkle roots  ·  item ordering  ·  50B HBAR supply</text>
<line x1="250" y1="170" x2="308" y2="300" stroke="#566573" stroke-width="1.8" marker-end="url(#arr-gray)"/>
<line x1="250" y1="375" x2="308" y2="390" stroke="#566573" stroke-width="1.8" marker-end="url(#arr-gray)"/>
<rect x="900" y="60" width="270" height="185" rx="8" fill="#fad7a0" stroke="#d35400" stroke-width="2.2"/>
<text x="1035" y="90" text-anchor="middle" dominant-baseline="central" font-size="18" font-family="sans-serif" font-weight="bold" font-style="normal" fill="#d35400">jumpstart.bin</text>
<text x="918" y="118" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">• Last block number</text>
<text x="918" y="140" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">• SHA-384 block root hash  (48 B)</text>
<text x="918" y="162" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">• Streaming Merkle tree state</text>
<text x="918" y="184" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">•   (leaf count + hash list)</text>
