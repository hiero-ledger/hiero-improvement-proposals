</defs>
<rect width="1200" height="680" fill="#ffffff"/>
<text x="600" y="34" text-anchor="middle" dominant-baseline="central" font-size="22" font-family="sans-serif" font-weight="bold" font-style="normal" fill="#1a5276">Historical Record File Bootstrap — System Overview</text>
