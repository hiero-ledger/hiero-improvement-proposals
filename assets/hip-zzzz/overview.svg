<text x="140" y="98" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" font-weight="bold" font-style="normal" fill="#566573">GCP Record Stream Bucket</text>
<text x="140" y="120" text-anchor="middle" dominant-baseline="central" font-size="11" font-family="sans-serif" font-weight="normal" font-style="italic" fill="#566573">(hedera-mainnet-streams)</text>
<text x="50" y="148" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">• Record files  (.rcd)</text>
<text x="50" y="170" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">• Signature files  (.sig)</text>
<text x="50" y="192" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">• Sidecar files</text>
<text x="50" y="214" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">• ≈ 30 TB total</text>
