<circle cx="358" cy="168" r="16" fill="#1a5276"/>
<text x="358" y="168" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" font-weight="bold" font-style="normal" fill="#ffffff">1</text>
<text x="390" y="162" text-anchor="start" dominant-baseline="central" font-size="13" font-family="sans-serif" font-weight="bold" font-style="normal" fill="#1a5276">Gather Mirror Node Metadata</text>
<text x="390" y="186" text-anchor="start" dominant-baseline="central" font-size="11" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">mirror fetchRecordsCsv  ·  extractBlockTimes  ·  extractDayBlock</text>
