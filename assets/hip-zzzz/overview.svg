<rect x="900" y="272" width="270" height="100" rx="8" fill="#a9dfbf" stroke="#1e8449" stroke-width="2.2"/>
<text x="1035" y="303" text-anchor="middle" dominant-baseline="central" font-size="15" font-family="sans-serif" font-weight="bold" font-style="normal" fill="#1e8449">Consensus Node</text>
<text x="1035" y="325" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">Loads jumpstart.bin at first</text>
<text x="1035" y="344" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">startup after upgrade</text>
<line x1="1035" y1="245" x2="1035" y2="270" stroke="#d35400" stroke-width="2" marker-end="url(#arr-orange)"/>
<rect x="900" y="405" width="270" height="175" rx="8" fill="#d7bde2" stroke="#6c3483" stroke-width="2.2"/>
<text x="1035" y="432" text-anchor="middle" dominant-baseline="central" font-size="15" font-family="sans-serif" font-weight="bold" font-style="normal" fill="#6c3483">Wrapped Historical Blocks</text>
<text x="918" y="458" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">• Deduplicated (one per block)</text>
<text x="918" y="480" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">• RSA-verified signatures</text>
<text x="918" y="502" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">• Block stream format</text>
<text x="918" y="524" text-anchor="start" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">• 10,000 blocks per .zip archive</text>
