<text x="1035" y="636" text-anchor="middle" dominant-baseline="central" font-size="15" font-family="sans-serif" font-weight="bold" font-style="normal" fill="#6c3483">Tier-1 Block Nodes</text>
<text x="1035" y="658" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">Ingest via historic file plugin</text>
<text x="1035" y="677" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="sans-serif" font-weight="normal" font-style="normal" fill="#1c2833">Backfill history from genesis</text>
